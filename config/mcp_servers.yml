# Each environment contains MCP HTTP servers. Omit tools, or set tools: [], to expose all server tools.
# Set tools to a non-empty list to expose only those MCP tool names.

- endpoint: https://gbrain.eshop.evexport.cn/mcp
  name: gbrain
  bearer_token: <%= ENV.fetch("GBRAIN_BEARER_TOKEN", "") %>
  tools:
    - query
    - search
    - get_page
    - list_pages
